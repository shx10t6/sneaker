<style>
:root {
  --bg-dark: #0a0b0f;
  --bg-card: #111318;
  --border: rgba(255,255,255,0.08);
  --accent: #e8c97a;
  --accent2: #c9a84c;
  --text-primary: #f0f2f5;
  --text-secondary: #8a8f9e;
  --text-muted: #555a6a;
  --white: #ffffff;
  --font-main: 'Cairo', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: var(--font-main);
  background:
    radial-gradient(ellipse 70% 45% at 50% 0%, rgba(232,201,122,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 35% 35% at 15% 85%, rgba(30,50,120,0.28) 0%, transparent 65%),
    var(--bg-dark);
  color: var(--text-primary);
  direction: rtl;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px;
}

.thank-you-wrap {
  width: 100%;
  max-width: 620px;
  text-align: center;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  color: var(--white);
  font-size: 22px;
  font-weight: 900;
}

.logo-s {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg-dark);
  font-size: 20px;
  font-weight: 900;
}

.thank-you-card {
  position: relative;
  overflow: hidden;
  background: rgba(17,19,24,0.84);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 28px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.38);
  backdrop-filter: blur(18px);
}

.thank-you-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(232,201,122,0.12), transparent 38%);
  pointer-events: none;
}

.success-mark {
  position: relative;
  width: 76px;
  height: 76px;
  margin: 0 auto 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg-dark);
  font-size: 34px;
  font-weight: 900;
  box-shadow: 0 0 0 14px rgba(232,201,122,0.09), 0 16px 44px rgba(232,201,122,0.18);
}

.thank-you-title {
  position: relative;
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 14px;
}

.thank-you-sub {
  position: relative;
  color: var(--text-secondary);
  font-size: 16px;
  line-height: 1.9;
  margin-bottom: 24px;
}

.delivery-note {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--accent);
  background: rgba(232,201,122,0.08);
  border: 1px solid rgba(232,201,122,0.22);
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 24px;
}

.thanks-line {
  position: relative;
  color: var(--text-primary);
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 30px;
}

.home-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 210px;
  min-height: 54px;
  padding: 15px 28px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg-dark);
  font-size: 16px;
  font-weight: 900;
  text-decoration: none;
  box-shadow: 0 12px 36px rgba(232,201,122,0.24);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.home-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 44px rgba(232,201,122,0.34);
}

.footer-copy {
  margin-top: 22px;
  color: var(--text-muted);
  font-size: 12px;
}

@media (max-width: 520px) {
  body { padding: 18px; }
  .thank-you-card { padding: 34px 20px; }
  .thank-you-sub { font-size: 15px; }
  .home-btn { width: 100%; }
}
</style>
</head>
<body>

  <main class="thank-you-wrap">
    <div class="logo">
      <div class="logo-s">S</div>
      Stepora
    </div>

    <section class="thank-you-card" aria-labelledby="thank-you-title">
      <div class="success-mark">✓</div>
      <h1 class="thank-you-title" id="thank-you-title">تم استلام طلبك بنجاح</h1>
      <p class="thank-you-sub">هنتواصل معاك قريبًا لتأكيد بيانات الطلب</p>
      <div class="delivery-note">الأوردر هيوصل خلال 10 أيام عمل</div>
      <p class="thanks-line">شكرًا لاختيارك Stepora</p>
      <a class="home-btn" href="index.html">العودة للرئيسية</a>
    </section>

    <p class="footer-copy">© 2026 Stepora — جميع الحقوق محفوظة</p>
  </main>
<script>
window.dataLayer = window.dataLayer || [];

function pushDataLayerEvent(eventName, data = {}) {
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: eventName,
    ...data
  });
  console.log("dataLayer event:", eventName, data);
}

function getSavedOrderTrackingData() {
  try {
    const saved = sessionStorage.getItem('stepora_order_tracking');
    return saved ? JSON.parse(saved) : {};
  } catch (error) {
    console.warn('Could not read Stepora order tracking data:', error);
    return {};
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const savedOrder = getSavedOrderTrackingData();
  const eventData = {
    product_name: savedOrder.product_name || 'Stepora Sneakers',
    currency: savedOrder.currency || 'EGP'
  };
  if (savedOrder.order_id) eventData.order_id = savedOrder.order_id;
  if (savedOrder.product_size) eventData.product_size = savedOrder.product_size;
  if (savedOrder.value) eventData.value = savedOrder.value;
  pushDataLayerEvent('thank_you_page', eventData);
});
</script>
</body>
